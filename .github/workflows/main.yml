name: Premier League News

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:          # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify main.py content
        run: |
          echo "First 20 lines of main.py:"
          head -n 20 main.py

      - name: List assets/clips folder
        run: |
          echo "Contents of assets/clips:"
          ls -la assets/clips/ || echo "Folder not found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (ffmpeg + imagemagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Configure ImageMagick policy (allow PDF)
        run: |
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run main script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          VOICERSS_API_KEY: ${{ secrets.VOICERSS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          PYTHONUNBUFFERED: 1
        run: python main.py

      - name: Upload final video artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: final_*.mp4