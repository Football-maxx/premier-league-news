name: Staging (Dry Run)

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run dry‑run with DRY_RUN=true
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          VOICERSS_API_KEY: ${{ secrets.VOICERSS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: "true"
        run: python src/main.py
      - name: Upload test video artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-video
          path: final_*.mp4
      - name: Telegram notification on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Staging dry-run failed!
            Repo: ${{ github.repository }}
            Run: ${{ github.run_id }}